# Introduction

???


---

class: center, middle

# "**Mormonism is a media religion**: every contribution to this forum makes this point in some way. Of course, the same could be said of most religions, and yet **the Mormon tradition in particular incorporates media**. How so?"

Peters, B., & Peters, J. D. (2018). Introduction: Small means, great things. *Mormon Studies Review*, *5*, 17-25.

???

Peters and Peters (2018) argue that "Mormonism is a media religion," conceding that most (or all) religions are dependent on media while affirming that "the Mormon tradition in particular incorporates media" (p. 17). The mediated nature of Mormonism invites conversation with Jacques Ellul in two ways. First, to the extent that Mormonism is, indeed, mediated to an unusual extent, scholars need theoretical frameworks to understand this special relationship. Ellul may therefore prove useful for organizing our thinking about Mormonism and media. 

---

class: center, middle 

# "When I started this project several years ago, I began with the question, **what can Mormonism teach us about the evolving relationship between technology and religion**? It was, and remains, a theoretical question about the cultural history of technology in America using a religious institution as a case study."

Feller, G. (2023). *Eternity in the ether: A Mormon media history*. University of Illinois Press.

???

Second, Feller (2023) suggests that Mormonism is a helpful example for exploring "the evolving relationship between technology and religion" (p. vii). Thus, considering Mormonism may help us expand our thinking on Ellul.

---

class: center, middle

<a title="Diliff, CC BY-SA 3.0 &lt;http://creativecommons.org/licenses/by-sa/3.0/&gt;, via Wikimedia Commons" href="https://commons.wikimedia.org/wiki/File:Salt_Lake_Temple,_Utah_-_Sept_2004.jpg"><img height = 550, alt="Salt Lake Temple" src="https://upload.wikimedia.org/wikipedia/commons/9/97/Salt_Lake_Temple%2C_Utah_-_Sept_2004.jpg"></a>

<p style = "font-size:smaller"><a href="https://commons.wikimedia.org/wiki/File:Salt_Lake_Temple,_Utah_-_Sept_2004.jpg">The Salt Lake Temple of The Church of Jesus Christ of Latter-day Saints in Salt Lake City, Utah</a> by <a href="https://en.wikipedia.org/wiki/User:Diliff">Diliff</a> is licensed under <a href="https://creativecommons.org/licenses/by-sa/3.0/deed.en">CC BY-SA 3.0</a></p>

???

Before exploring this conversation between Ellul and Mormonism, it will be helpful to clarify two points. First, Mormonism is a diverse collection of religious traditions, the most prominent of which nonetheless agree that they prefer not to be described as "Mormon" (see Shields, 2019). I use this term here to refer to the largest and best-known of these traditions, the Church of Jesus Christ of Latter-day Saints, which claims over 17 million members and is headquartered in Utah, USA. 

---

class: center, middle

# "In this book I regularly use the terms 'Mormon' and “Mormonism,” which the Church of Jesus Christ of Latter-day Saints has sought to retire since 2019. The term is more accurate for this project not only because the period covered here is before 2019 but also **because I am not seeking to represent the church but rather a more capacious theological tradition**."

Petrey, T. G. (2024). *Queering kinship in the Mormon cosmos*. The University of North Carolina Press.

???

I follow Petrey (2024) in using the term "Mormon" despite this church's strong preference for other names "because I am not seeking to represent the church but rather a more capacious... tradition" (p. xi). Second, while Humiliation of the Word demonstrates the extent to which Ellul considered the theological and sociological aspects of his work to be inseparable (see also Rognon, 2024), this paper is more about sociological observation than theological evaluation. 


---

class: center, middle

<p style = "font-size:smaller"><a href="https://en.wikipedia.org/wiki/File:IndependenceTemple.jpg">The Community of Christ Indpendence Temple in Independence, Missouri</a> by <a href="https://en.wikipedia.org/wiki/User:Jonathunder">Jonathunder</a> is licensed under the GNU Free Documentation License</p>
???

Second, while *Humiliation of the Word* demonstrates the extent to which Ellul considered the theological and sociological aspects of his work to be inseparable (see also Rognon, 2024), my paper is more about sociological observation than theological evaluation. I do have personal connections to two different Mormon traditions and confess a personal interest in Ellul and Mormon theology. However, I am here as a technology researcher employed by a public US university and will limit my comments to that capacity.

class: center, middle

# Mormonism's Foundational Media

???

The many Mormon traditions that now exist all share a common origin: Joseph Smith Jr.'s 1830 organization of a church—originally called the "Church of Christ"—in upstate New York, USA. 


---

class: center, middle

<img src="https://upload.wikimedia.org/wikipedia/commons/c/c8/Joseph_Smith_first_vision_stained_glass.jpg" height = 600>

???

Yet, contemporary Latter-day Saint authorities and missionaries typically trace the beginnings of Smith's movement to "The First Vision," a theophany that Smith purportedly experienced as a teenager sometime during the 1820s. 

---

class: center, middle

<a title="101heather, Public domain, via Wikimedia Commons" href="https://commons.wikimedia.org/wiki/File:Mormon-book.jpg"><img height="600" alt="The cover of the Book of Mormon" src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Mormon-book.jpg/500px-Mormon-book.jpg"></a>

???

However, this visionary experience was not frequently discussed in the early years of Mormonism (e.g., Allen, 1966; Harper, 2020), and early members of Smith's church were more attracted by the Book of Mormon, a new volume of scripture that he claimed to have translated from records kept by ancient proto-Christians living on the American continent.

---

class: center, middle

<table><tr><td><img src="https://upload.wikimedia.org/wikipedia/commons/c/c8/Joseph_Smith_first_vision_stained_glass.jpg" height = 600><a title="101heather, Public domain, via Wikimedia Commons" href="https://commons.wikimedia.org/wiki/File:Mormon-book.jpg"></td><td><img height="600" alt="The cover of the Book of Mormon" src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Mormon-book.jpg/500px-Mormon-book.jpg"></a></td><tr></table>

???

Both events invite analysis through an Ellulian lens. In particular, and in keeping with the theme of this conference, Ellul's Humiliation of the Word provides a useful framework for explaining how these events are understood in Mormonism and, therefore, how Mormonism engages with media more broadly. Both the First Vision and the translation of the Book of Mormon can be (and have been) understood as either word or image as Ellul describes them. Of course, these various understandings sometimes blur the distinction that Ellul himself acknowledges is an oversimplification and perhaps more of an imprecise spectrum.

---

class: center, middle

<img src="https://wipf-stock-us.imgix.net/covers/9781532642562.jpg" height = 600>

???

Importantly, however, Ellul does not merely distinguish word from image; this comparison is an extension of a more foundational distinction between *truth* and *fact* (or truth and reality) that serves as a recurring theme in his writing. It is here that Humiliation of the Word becomes especially useful for studying Mormonism. As I will demonstrate, *image*-based understandings of the movement's foundational media tend to correspond with Mormon emphasis on *fact* whereas *word*-based understandings are sometimes avoided because of a discomfort with *truth* (in the Ellulian sense). In the remainder of this section, I will elaborate on these ideas. 

---

class: center, middle

background-color: #272822

<h2 style="color:white; text-align:center">The First Vision</h2>

???

In the past decade, no fewer than four scholars (two writing as co-authors) have made the argument that despite the name "First Vision," the theophany popularly understood as the founding event of Mormonism can—and perhaps should—actually be understood in terms of sound.

---

class: center, middle

# "What is most striking, then, is not simply that the first vision is as much audition as vision—that is, that revelation entails sound as well as image—but rather that **from the very first moment, Mormonism has been produced *through* sound** while simultaneously theorizing *about* its relationship to sound."

Harris, S. J., & McMurray, P. (2018). Sounding Mormonism. *Mormon Studies Review*, *5*, 33-45.

???

In 2018, Harris and McMurray argued that "from the very first moment, Mormonism has been produced through sound" (p. 34).

---

class: center, middle

# "Ironically, the storied First Vision depends less on *seeing* than on the practice of *speaking and hearing*."

Johnson, J. (2019). *Mormons, musical theater, and belonging in America*. University of Illinois Press.

???

Similarly, Johnson's 2019 book distances the First Vision from vision to set the stage for a theory of how voice plays an important role in Mormonism. 

---

class: center, middle

# "Following the Prophet’s martyrdom in 1844, his followers began to call this world-­ historical moment in a woodlot—the origin, as it were, of modernity—­the First Vision.

# "In media terms, a more appropriate descriptor would be the First Audition."

Farmer, J. (2025). *The sound of Mormonism: A media history of Latter-day Saints* (Leonard J. Arrington Mormon History Lecture Series, no. 28). Merill-Cazier Library, Utah State University.

???

Finally, Farmer's 2025 "Media History of Latter-day Saints" begins with a chapter entitled "The First Audition" (p. 3).

---

class: center, middle

# "Precisely because this God continues to direct and command through his Word alone... **He never does anything but speak**."

Ellul, J. (1985). *The Humiliation of the Word*. Wipf & Stock.

???

None of these conceptions is a perfect match with Ellul's writing, but in the aggregate, they do suggest the possibility of understanding this event through the lens of the word. While these arguments are scholarly rather than theological, they do create room for Ellul's (1985) insistence that God "never does anything but speak," (p. 68) and makes few concessions to sight.



---

class: center, middle

# "The 1838 account tha circulated most widely in print **stressed the urgency that Smith's eyes had not deceived him, almost to the point of obsession**s."

Allred, M. K. (2023). *Seeing things: Technologies of vision and the making of Mormonism*. University of North Carolina Press.

???

In contrast, the canonical Latter-day Saint account of the First Vision—in that it has been added to the expanded scriptural canon that is typical of Mormon traditions—is insistent that it was, indeed, a vision. Allred (2023), in his book subtitled "Technologies of Vision and the Making of Mormonism," describes this account as "stress[ing] the urgency that Smith's eyes had not deceived him, almost to the point of obsession" (p. 23). 

---

class: center, middle

# "I had actualy [sic] seen a light... I have actually seen a vision... why does the world think to make me deny what I have actually seen, for I had seen a vision, I knew it, and I knew that God knew it, and I could not deny it...." 

[Joseph Smith History, circa June 1839-circa 1841 [Draft 2]](https://www.josephsmithpapers.org/paper-summary/history-circa-june-1839-circa-1841-draft-2/4)

???

Indeed, Smith writes: "I had actualy [sic] seen a light... I have actually seen a vision... why does the world think to make me deny what I have actually seen, for I had seen a vision, I knew it, and I knew that God knew it, and I could not deny it...."

---

class: center, middle

???

While Ellul (1985) argues for the impossibility of "true theophany" (p. 72), Smith insisted that he had experienced such a phenomenon.

---

class: center, middle

???

However, even Smith's supporters were not always so insistent on literal vision. As previously noted, although the First Vision plays an important role in contemporary Latter-day Saint evangelism and theology, it was not well known among early Mormons. Orson Pratt, a contemporary of Smith elevated by him to a high church position, would play a crucial role in the late 19th century in making the First Vision central to Mormon thinking (Harper, 2020). Indeed, Pratt appears to be one of the first to use an account of the vision for evangelism purposes, printing an 1840 pamphlet in Great Britain during missionary service there. 

---

class: center, middle

???

However, in this pamphlet, he described Smith's mind as "caught away, from the natural objects with which he was surrounded; and he was enwrapped in a heavenly vision" (see Morris, 2019 p. 98). 

---

class: center, middle

???

This account is less insistent on literal sight and more closely resembles Ellul's (1985) conception of visions as "deal[ing] with realities utterly different from the ones which make up the world perceived by our senses" (p. 77).

---

class: center, middle

???

Furthermore, there is another aspect of the First Vision that also associates it with the word side of Ellul's spectrum. The canonical account I have been referencing, the one described by Allred as almost obsessed with the visual, is not the only account of Smith's theophany. It was written in 1838, over a decade after the experience reportedly took place, sometime in the early-to-mid 1820s (see Taves, 2020). However, between 1832 and 1842, Smith wrote at least four accounts of this experience.

---

class: center, middle

???

Perhaps unsurprisingly, there are differences between these other accounts and the canonical one, including whether God alone appeared to Smith or God and Jesus appeared as two separate persons.

---

class: center, middle

???

These differences, while potentially awkward for orthodox Latter-day Saints, are consistent with Ellul's (1985) observations about the word: He argues that if you ask "the person speaking with you to repeat the explanation he has just given... it will be different" (p. 44). 

---

class: center, middle

???

And yet, the existence of a canonical account demonstrates Latter-day Saint authorities' interest in fixing this word in writing so that it takes on aspects of the image, becoming, in Ellul's words, "continually repeated and always identical" (p. 44). Indeed, for about three decades, the early 1832 account of this event was even removed from the letterbook it was originally recorded in (see Larson, 2014), presumably to support an "always identical" understanding of the theophany by removing a conflicting version.

---

class: center, middle

background-color: #272822

<h2 style="color:white; text-align:center">The Translation of the Book of Mormon</h2>

???

Joseph Smith claimed to have translated the Book of Mormon from records engraved on metal plates by religious and political figures who had purportedly lived in the Americas centuries, and even millennia, before. 

---

class: center, middle

???

Because Smith himself offered little insight (see, e.g., Hardy, 2021; Morris, 2019), the exact mechanics of this translation have been a subject of considerable conjecture and discussion.

A 2003 episode of the American animated television show South Park caused controversy in Mormon circles by depicting Smith as looking into "seer stones" in a hat.

---

class: center, middle

???

This contrasted with official Latter-day Saint representations of the translation, which showed Smith reading from the plates. Although both depictions clearly emphasize the visual, the South Park depiction was uncomfortable for the way it resembled American 19th century folk magic practices.

---

class: center, middle

???

It therefore came as a surprise when, in 2013, an official Latter-day Saint essay implicitly accepted the South Park portrayal--or, more accurately, accepted the historical accounts that portrayal had been based on.

---

class: center, middle

???

However, Duffy (2020) has argued that:
"For forthrightly addressing problematic historical information..., the Gospel Topics essay may seem progressive. In a larger picture, however, the essay is significant... because it is markedly conservative even by LDS standards" (p. 99)


---

class: center, middle

???

This is where Ellul's framework enters. As Duffy goes on to explain, the essay didn't just accept the seer stone scenario but also argued that "Smith read the English translation from the interpretive instruments." (p. 99, emphasis in original; see also Hardy, 2021). This understanding of the translation of the Book of Mormon affirms that Smith *saw* written words *visually* appear in a seer stone.

---

class: center, middle

???

One account of this process, paraphrasing a 40-year-old memory from Smith's first scribe, goes even further: 
"By aid of the seer stone, sentences would appear and were read by [Smith] and written by [his scribe], and when finished [the scribe] would say, 'Written,' and if correctly written, that sentence would disappear and another appear in its place" (Morris, 2019, p. 269). 

If the folk magic connotations of this understanding remain awkward, it is nonetheless desirable for the way it appeals to the image as Ellul understands it. How can one contest the text of the Book of Mormon if it was read word-by-word from a divinely prepared seer stone?


---

class: center, middle

???

However, this is not the only way of understanding the mechanics of Book of Mormon translation. Indeed, even a 2025 Latter-day Saint essay appears to back off from strong claims; while it argues that "as Joseph looked into these objects, the text of the Book of Mormon was revealed to him" (Church of Jesus Christ of Latter-day Saints, n.d.), it does not go so far as to say that the text *appeared* in the seer stone.

---

class: center, middle

???

Of course, this is more of a backing away from the image than an embrace of the word, but Duffy (2008, 2020) has described how even some Mormon apologists have conceded that Smith must have played an active role in developing the text, subjectively interpreting spiritual impressions. This suggests a certain amount of "blessed uncertainty" (Ellul, 1985, p. 18) in a revelatory process that is now understood as closer to Ellul's *word*. 

---

class: center, middle

???

Scholars not bound by apologetic commitments have gone even further. Davis (2020) draws on 19th century U.S. cultures of orality to argue that Smith "produced the Book of Mormon in an extended oral performance" (p. 7).

---

class: center, middle

???

More specifically, he suggests Smith "produced, revised, and honed the narratives" (p. 190) over the course of four years and then, based on his own memory and perhaps "a small handful of notes," Smith could "expand rapidly and extemporaneously in the moment of oral performance" (p. 190).

---

class: center, middle

???

Davis's invocation of secret notes is necessarily speculation, but it does open the door to other considerations of how Smith engaged with written texts during the translation process. Ellul sees the written word as somewhere between the true word and the image. In the context of "religious writing," he specifically argues that it "is filled with life only when it serves as a support and starting point for a word that is spoken, announced, or proclaimed." (Ellul, 1985, p. 46).

---

class: center, middle

???

While the goal of Book of Mormon translation was to produce written word, let us consider Davis's understanding of the translation process as oral performance. In this context, we can still understand any of Smith's orally reproducing written texts in these Ellulian terms. Somewhat infamously, the Book of Mormon quotes the King James Version of the Bible at such length that scholars have been able to consider which specific edition of that translation it quotes from (Skousen, 2019).

---

class: center, middle

???

While some apologists have insisted that these near-verbatim quotations were produced through the seer stone--or at least through some revelatory process--others have conceded the likelihood that Smith dictated from (and made occasional verbal edits to) text that he was reading from an open Bible (Duffy, 2020; see also Skousen's 2019 discussion of evidence for dictation). Townsend (2025) goes even further, arguing that Smith used Adam Clarke's influential Bible commentary as a source for his occasional verbal edits.

---

class: center, middle

background-color: #272822

<h2 style="color:white; text-align:center">Image, Reality, and Technique in Mormon Thought</h2>

???

Thus far, I have demonstrated that the two foundational media events of Mormonism--Joseph Smith's First Vision and his translation of the Book of Mormon--can be understood as closer to either Ellul's concept of the *word* or his concept of the *image*. You may have noticed that it is most often scholars who privilege *word*-based explanations of these events while church authorities and conservative apologists tend to insist on *image*-oriented accounts. Like the underlying image/word framework I am borrowing from Ellul, this is a bit of an oversimplification, but the pattern is consistent enough to be useful for my purposes here. What I would like to accomplish in this section is to tie this conservative preference for the image to a preference for *reality* over *truth*, again following Ellul's distinction of the two in *Humiliation of the Word*.

---

class: center, middle

???

Of course, we are also never far from technique when engaging with Ellul, and it is also helpful to consider how this concept may be relevant when exploring the connections between image and reality. 

---

class: center, middle

???

First, Ellul (1985) explicitly links both concepts to technique, arguing that humanity's overemphasis on reality is "a problem that comes from technique's preponderant influence" (p. 27) 

---

class: center, middle

???

and that "technique produces the means of images" (p. 148).

---

class: center, middle

???

Second, Ellul famously insists that technique must be evaluated as a whole and that it is less useful to consider individual examples of the broader phenomenon. While I have discussed Smith's First Vision and his translation of the Book of Mormon as distinct events, it is useful in the context of Ellul's technique to consider how the two are intertwined. 

---

class: center, middle

???

In fact, Allred (2023) has already done so, arguing that "Latter-day Saints used print to store and reproduce the powerful electric shock of Smith's vision" (p. 25). While Allred does not use Ellulian terms, his observation helps us consider how early Mormon media events built off of each other to serve as a technicized whole. 

---

class: center, middle

???

Furthermore, there is a third media event of early Mormonism that explains the appeal of that technicized whole for Smith and his successors. Allred (2023) notes that at least initially, printed words were used not only to "store" Smith's vision but also "to help readers experience their own" (p. 25). Indeed, very early Mormonism encouraged all to seek their own visions, perhaps bringing these events more in line with Ellul's non-technical *word*, with truth being affirmed through dialogue between multiple personal visions.

---

class: center, middle

???

However, Feller (2023) notes that one early follower's use of another seer stone ultimately "threatened Smith’s self-proclaimed prophetic authority as head of the newly organized Church of Christ" (p. 18). It is in response to events like this that Allred describes the written word as not only recording Smith's visions but also systematizing the visionary experience, including by concentrating visionary authority in the church's leader. 

---

class: center, middle

???

In short, Mormons were quickly encouraged to become what Ellul (1964) described in a different context as "individuals who conform to the structure and the needs of the technical group" (p. 349). 

---

class: center, middle

???

This emphasis on conformity to the reality of technique is a frequent complaint in Ellul's writing (though outside of *Humiliation of the Word*, he often describes this reality in terms of facts). Thus, in some of his earliest writing, originally published in 1948, he ironically explains the use of the atomic bomb as finding "ourselves before a fact; thus we had to accept it" (Ellul, 2016, p. 23)

---

class: center, middle

???

 In his notes posthumously published as *Théologie et technique* (and more recently translated as *Theology and Technique*), he similarly bemoans an attitude of "l'intervention génétique est un fait -- donc... [genetic engineering is a fact -- therefore...]" (p. 81). While *Humiliation of the Word* clearly does not avoid the subject of technique, it addresses self-evidence in broader terms with its treatment of image and reality.

---

class: center, middle

???

Thus, Joyce Main Hanks, who translated the book into English, describes Ellulian reality as dealing "with fixed things not open to discussion, things which one can only observe. It forces us to conform" (Ellul, 1985, p. xvi).

---

class: center, middle

???

With this foundation in place, I would like to suggest that the typical (if not universal) Mormon deference to image-based understanding of the tradition's media events is because despite the Mormon cliché of believers using the stock phrase "I know [our] church is true" during monthly testimony meetings, these believers are actually more invested in *reality*.

---

class: center, middle

???

Indeed, the First Vision and the Book of Mormon are often invoked to invite conformity with specific Mormon beliefs. Although the First Vision was rarely discussed or referenced in the early years of Mormonism, it has since become "a series of foundational LDS scriptural 'prooftexts' to support various formal and informal church doctrines," including distinct Latter-day Saint beliefs about an embodied, non-Trinitarian God (Howlett, 2020, p. 139).

---

class: center, middle

???

Similarly, Latter-day Saint missionaries are encouraged to prioritize the Book of Mormon when teaching general Christian beliefs, affirming more specific Latter-day Saint teachings, and when helping "people find answers or insights to their personal questions--or questions of the soul" (Intellectual Reserve, 2023, p. 117). 

Missionaries are also taught to develop a rhetorical chain by which the reality of the volume of scripture is translated into the need to accept Joseph Smith as a prophet of God, which is then used to support the claim that the Church of Jesus Christ of Latter-day Saints is God's only authorized church on earth (though, of course, this reasoning ignores the existence of other Mormon traditions).

---

class: center, middle

???

It is remarkable the extent to which the Latter-day Saint institution is willing to associate its own fate with the reality of its founding media events. Howlett (2020) notes that Gordon Hinckley, an influential Latter-day Saint leader who presided over the church from 1995 to 2008, repeatedly "referred to the First Vision as a foundational part of the LDS mythos that had to have happened as a historical event or else, he suggested, the LDS Church itself was a sham" (see also Harper, 2020). 

---

class: center, middle

???

One of Hinckley's predecessors, Ezra Taft Benson, similarly tied the validity of the church he led to the reality of its claims about the Book of Mormon (Intellectual Reserve, 2023). 

To skeptical outsiders, it may seem like a reckless gamble to marry the reputation of the church to the reality of some of its boldest claims. However, understanding Latter-day Saint believers and leaders as being invested in not only a church but in a technical system to which others must conform helps explain this thinking. An Ellulian technical system privileges reality, and if it is to privilege reality, it must be based in the image.

---

background-color: gray

class: center, middle

# Ellul and Mormonism

???

In introducing this paper, I suggested that to the extent that Mormonism is indeed uniquely mediated among religions, it invites two connections with Ellul's work. First, Ellul's writing on both media and religion may offer a productive framework for scholarly understanding of Mormonism. Second, the examples provided by Mormonism may offer new understandings of Ellul's writing. 

---

class: center, middle

background-color: #272822

<h2 style="color:white; text-align:center">Ellul's Relevance for Mormonism</h2>

???

My analysis of the First Vision and the translation of the Book of Mormon suggests the relevance of Ellul's writing for the study of Mormonism, even beyond these two cases. 

---

class: center, middle

???

Feller (2023) has argued that one of the reasons that "Mormonism is interesting for scholars of media and communication" is that "the timeline of Mormonism's organizational development parallels, somewhat uncannily, the timeline of electronic media innovation" (p. 6). 

---

class: center, middle

???

This broader coincidence is paralleled more narrowly in the context of Ellulian technique. In The Technological Society, Ellul (1964) repeatedly emphasizes the nineteenth century as a turning point in the history and significance of technique; for example, he suggests that "Mauss's definition... was valid for technique until the eighteenth century" (p. 15) but no longer. If a purported theophany and the dictation of a new volume of scripture are not the most intuitive examples of technique, their origins in the early 1820s and the ease with which they can be understood as word or image suggests that Mormonism was born in an Ellulian context and may be productively understood through his ideas.

---

class: center, middle

???

For one, while many scholars have asked questions about "Mormonism and technology," Ellul's conception of technique invites an alternate understanding of "Mormonism as a technical system." For example, instead of Feller's (2023) exploration of "coevolution of technology and institutional religion over time" (p. 3), an Ellulian lens would question whether those are two separate phenomena that can co-evolve--or whether media techniques and organizational techniques are part of a single religious apparatus.

Going even further, Ellul's association of image, reality, and technique suggests that we can also consider the epistemological foundations undergirding Mormon theology--and affirming Latter-day Saint authority--to also be part of this technicized whole. Indeed, I have already demonstrated the way that visions, texts, and organizational structures have been interpreted and reinterpreted within Mormonism to maintain that authority. Given the resonance of Ellul's ideas with the founding events of Mormonism, scholars may also profitably consider how other aspects of the Latter-day Saint institution also fit into a technical apparatus.

---

class: center, middle

???

For example, while Ellul (1964) seems keen to distance religion from technique, he does acknowledge the existence of techniques intended "to obtain certain results of a spiritual order" (p. 24). Latter-day Saint sacraments and rites--held to be necessary to salvation--might profitably be considered through this lens.

---

class: center, middle

???

Indeed, an Ellulian perspective could be helpful for understanding the "ritualization of discourse" (Ellul, 1985, p. 265) whereby Latter-day Saint temple rites once preserved only through the word were systematized into an authoritative image (not to mention the gradual mediation of these rites for the purposes of efficiency; on both, see Buerger, 1987).

---

class: center, middle

???

However, a holistic view of technique within the Latter-day Saint context is still narrower than what Ellul (1964) argues for. Instead, he argues, "the technical phenomenon presents, everywhere and essentially, the same characteristics" (p. 94). 

---

class: center, middle

???

To the extent that Latter-day Saint authorities work the First Vision, the Book of Mormon, sacraments, and ecclesiastical organization into a technical whole, they are also attentive to the traditional belief that "technique and religion [are] in opposition" (p. 423). Indeed, contemporary church leaders praise modern technologies such as the internet and artificial intelligence while also warning against them.

In a classic sociological study of Mormonism, Armand Mauss (1994) described Mormonism's wavering between assimilation into and retrenchment from broader American culture. Ellul's insistence on the totality of technique allows for a variation on this observation. Latter-day Saint leaders embrace modern technique to the extent that it is seen as supporting an internal totality. However, they also resist it to the extent that Mormonism is threatened by a broader technical totality.

---

---

class: center, middle

background-color: #272822

<h2 style="color:white; text-align:center">Mormonism's Expansion of Ellul</h2>

???

class: center, middle

???

For all that Ellulian thought may be useful for making sense of Mormonism, studying Mormonism may challenge Ellulian ideas in productive ways. For example, as I have alluded to throughout this paper, Ellul associates the image with reality and the word with truth, establishing a strong association between medium and epistemology.

---

class: center, middle

???

While I do not mean to overstate this association--once again, Ellul (1985) describes the image/word distinction as a "misleading simplification" (p. 2)--my present analysis suggests that the image and word may be thought of as malleable perspectives of individuals rather than fixed attributes of media. Indeed, both events that I have considered clearly incorporate both visual and oral elements, directly challenging the simplification that Ellul admits to.

---

class: center, middle

???

More importantly, I have explored the possibility that whether individual Mormons perceive these events through image- or word-oriented lenses is driven more by underlying commitments to reality or truth than by any feature of these events. Ellul (1985) describes the image as "deceptive" because "it passes itself off as reality when it is artifice" (p. 32); 

---

class: center, middle

???

can the problematic features of a medium be minimized if it is acknowledged to have the "fuzziness" (p. 17) of the word?

---

class: center, middle

???

Indeed, understanding image and word as different epistemological approaches to a single medium may be helpful for understanding the current landscape of online Mormonism. Feller (2023) describes how Latter-day Saint authorities used earlier media such as radio and film to "extend and amplify existing texts" (p. 49), reappropriating their image-like qualities to bolster (rather than entirely cede) their authority.

---

class: center, middle

???

In contrast, Avance (2025) describes how internet technology "frees members to express unconventional and even heretical ideas about Mormonism and its proper expression" (p. 10).

---

class: center, middle

???

It is difficult to imagine Ellul as accepting social media platforms as embodying the true word. Yet, if "the word is no longer involved" in the realm of television "since no dialogue is possible" (Ellul, 1985, p. 23), the unprecedented dialogue afforded by digital platforms to individual Mormons suggests some kind of resurgence of the word while Latter-day Saint institutions struggle to maintain a certain image. 

---

class: center, middle

???

Of course, this is not to ignore Ellul by naïvely embracing the purported liberatory potential of modern technique. Indeed, the case of online Mormonism provides another opportunity to extend Ellul's thinking by offering a contemporary variation of his warning about the image. In *Humiliation of the Word*, Ellul (1985) insists that "we must constantly remind ourselves of the ambiguity behind the apparent objectivity of the image" (p. 32).

---

class: center, middle

???

Conversely, while it is incontestable that modern social media platforms allow for the kind of discussion and dialogue that Ellul valorizes--but that the Latter-day Saint technical apparatus has historically limited--the Dutch researcher José van Dijck (2019) argues a digital platform "shapes the performance of social acts instead of merely facilitating them" (p. 29). In Ellulian terms, if the technical foundations of the image betray its promise of objectivity, the technical foundations of contemporary social media likewise betray its promise to capture the true word. Just as Latter-day Saint authorities must resist assimilation into a larger technical apparatus even as they adopt digital media for their own purposes, those trying to carve out a space for the word within Mormonism must also beware of the influence of that same apparatus.

---

class: center, middle

???
