# "**Mormonism is a media religion**: every contribution to this forum makes this point in some way. Of course, the same could be said of most religions, and yet **the Mormon tradition in particular incorporates media**. How so?"

Peters, B., & Peters, J. D. (2018). Introduction: Small means, great things. *Mormon Studies Review*, *5*, 17-25.

???

Peters and Peters (2018) argue that "Mormonism is a media religion," conceding that most (or all) religions are dependent on media while affirming that "the Mormon tradition in particular incorporates media" (p. 17). The mediated nature of Mormonism invites conversation with Jacques Ellul in two ways. First, to the extent that Mormonism is, indeed, mediated to an unusual extent, scholars need theoretical frameworks to understand this special relationship. Ellul may therefore prove useful for organizing our thinking about Mormonism and media. 

---

class: center, middle 

# "When I started this project several years ago, I began with the question, **what can Mormonism teach us about the evolving relationship between technology and religion**? It was, and remains, a theoretical question about the cultural history of technology in America using a religious institution as a case study."

Feller, G. (2023). *Eternity in the ether: A Mormon media history*. University of Illinois Press.

???

Second, Feller (2023) suggests that Mormonism is a helpful example for exploring "the evolving relationship between technology and religion" (p. vii). Thus, considering Mormonism may help us expand our thinking on Ellul.
