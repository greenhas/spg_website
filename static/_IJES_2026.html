# Introduction

???


---

class: center, middle

# "**Mormonism is a media religion**: every contribution to this forum makes this point in some way. Of course, the same could be said of most religions, and yet **the Mormon tradition in particular incorporates media**. How so?"

Peters, B., & Peters, J. D. (2018). Introduction: Small means, great things. *Mormon Studies Review*, *5*, 17-25.

???

Peters and Peters (2018) argue that "Mormonism is a media religion," conceding that most (or all) religions are dependent on media while affirming that "the Mormon tradition in particular incorporates media" (p. 17). The mediated nature of Mormonism invites conversation with Jacques Ellul in two ways. First, to the extent that Mormonism is, indeed, mediated to an unusual extent, scholars need theoretical frameworks to understand this special relationship. Ellul may therefore prove useful for organizing our thinking about Mormonism and media. 

---

class: center, middle 

# "When I started this project several years ago, I began with the question, **what can Mormonism teach us about the evolving relationship between technology and religion**? It was, and remains, a theoretical question about the cultural history of technology in America using a religious institution as a case study."

Feller, G. (2023). *Eternity in the ether: A Mormon media history*. University of Illinois Press.

???

Second, Feller (2023) suggests that Mormonism is a helpful example for exploring "the evolving relationship between technology and religion" (p. vii). Thus, considering Mormonism may help us expand our thinking on Ellul.

---

class: center, middle

<a title="Diliff, CC BY-SA 3.0 &lt;http://creativecommons.org/licenses/by-sa/3.0/&gt;, via Wikimedia Commons" href="https://commons.wikimedia.org/wiki/File:Salt_Lake_Temple,_Utah_-_Sept_2004.jpg"><img height = 550, alt="Salt Lake Temple" src="https://upload.wikimedia.org/wikipedia/commons/9/97/Salt_Lake_Temple%2C_Utah_-_Sept_2004.jpg"></a>

<p style = "font-size:smaller"><a href="https://commons.wikimedia.org/wiki/File:Salt_Lake_Temple,_Utah_-_Sept_2004.jpg">The Salt Lake Temple of The Church of Jesus Christ of Latter-day Saints in Salt Lake City, Utah</a> by <a href="https://en.wikipedia.org/wiki/User:Diliff">Diliff</a> is licensed under <a href="https://creativecommons.org/licenses/by-sa/3.0/deed.en">CC BY-SA 3.0</a></p>

???

Before exploring this conversation between Ellul and Mormonism, it will be helpful to clarify two points. First, Mormonism is a diverse collection of religious traditions, the most prominent of which nonetheless agree that they prefer not to be described as "Mormon" (see Shields, 2019). I use this term here to refer to the largest and best-known of these traditions, the Church of Jesus Christ of Latter-day Saints, which claims over 17 million members and is headquartered in Utah, USA. 

---

class: center, middle

# "In this book I regularly use the terms 'Mormon' and “Mormonism,” which the Church of Jesus Christ of Latter-day Saints has sought to retire since 2019. The term is more accurate for this project not only because the period covered here is before 2019 but also **because I am not seeking to represent the church but rather a more capacious theological tradition**."

Petrey, T. G. (2024). *Queering kinship in the Mormon cosmos*. The University of North Carolina Press.

???

I follow Petrey (2024) in using the term "Mormon" despite this church's strong preference for other names "because I am not seeking to represent the church but rather a more capacious... tradition" (p. xi). Second, while Humiliation of the Word demonstrates the extent to which Ellul considered the theological and sociological aspects of his work to be inseparable (see also Rognon, 2024), this paper is more about sociological observation than theological evaluation. 


---

class: center, middle

<a href="https://en.wikipedia.org/wiki/File:IndependenceTemple.jpg#/media/File:IndependenceTemple.jpg"><img src="https://upload.wikimedia.org/wikipedia/en/thumb/7/7e/IndependenceTemple.jpg/1280px-IndependenceTemple.jpg" height = 550 alt="File:IndependenceTemple.jpg"></a>

<p style = "font-size:smaller"><a href="https://en.wikipedia.org/wiki/File:IndependenceTemple.jpg">The Community of Christ Indpendence Temple in Independence, Missouri</a> by <a href="https://en.wikipedia.org/wiki/User:Jonathunder">Jonathunder</a> is licensed under the GNU Free Documentation License</p>
???

Second, while *Humiliation of the Word* demonstrates the extent to which Ellul considered the theological and sociological aspects of his work to be inseparable (see also Rognon, 2024), my paper is more about sociological observation than theological evaluation. I do have personal connections to two different Mormon traditions and confess a personal interest in Ellul and Mormon theology. However, I am here as a technology researcher employed by a public US university and will limit my comments to that capacity.

class: center, middle

# Mormonism's Foundational Media

???

The many Mormon traditions that now exist all share a common origin: Joseph Smith Jr.'s 1830 organization of a church—originally called the "Church of Christ"—in upstate New York, USA. 


---

class: center, middle

<img src="https://upload.wikimedia.org/wikipedia/commons/c/c8/Joseph_Smith_first_vision_stained_glass.jpg" height = 600>

???

Yet, contemporary Latter-day Saint authorities and missionaries typically trace the beginnings of Smith's movement to "The First Vision," a theophany that Smith purportedly experienced as a teenager sometime during the 1820s. 

---

class: center, middle

<a title="101heather, Public domain, via Wikimedia Commons" href="https://commons.wikimedia.org/wiki/File:Mormon-book.jpg"><img height="600" alt="The cover of the Book of Mormon" src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Mormon-book.jpg/500px-Mormon-book.jpg"></a>

???

However, this visionary experience was not frequently discussed in the early years of Mormonism (e.g., Allen, 1966; Harper, 2020), and early members of Smith's church were more attracted by the Book of Mormon, a new volume of scripture that he claimed to have translated from records kept by ancient proto-Christians living on the American continent.

---

class: center, middle

<table><tr><td><img src="https://upload.wikimedia.org/wikipedia/commons/c/c8/Joseph_Smith_first_vision_stained_glass.jpg" height = 600><a title="101heather, Public domain, via Wikimedia Commons" href="https://commons.wikimedia.org/wiki/File:Mormon-book.jpg"></td><td><img height="600" alt="The cover of the Book of Mormon" src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Mormon-book.jpg/500px-Mormon-book.jpg"></a></td><tr></table>

???

Both events invite analysis through an Ellulian lens. In particular, and in keeping with the theme of this conference, Ellul's Humiliation of the Word provides a useful framework for explaining how these events are understood in Mormonism and, therefore, how Mormonism engages with media more broadly. Both the First Vision and the translation of the Book of Mormon can be (and have been) understood as either word or image as Ellul describes them. Of course, these various understandings sometimes blur the distinction that Ellul himself acknowledges is an oversimplification and perhaps more of an imprecise spectrum.

---

class: center, middle

<img src="https://wipf-stock-us.imgix.net/covers/9781532642562.jpg" height = 600>

???

Importantly, however, Ellul does not merely distinguish word from image; this comparison is an extension of a more foundational distinction between truth and fact (or truth and reality) that serves as a recurring theme in his writing. It is here that Humiliation of the Word becomes especially useful for studying Mormonism. As I will demonstrate, image-based understandings of the movement's foundational media tend to correspond with Mormon emphasis on fact whereas word-based understandings are sometimes avoided because of a discomfort with truth (in the Ellulian sense). In the remainder of this section, I will elaborate on these ideas. 

---

class: center, middle

background-color: #272822

<h2 style="color:white; text-align:center">The First Vision</h2>

???

In the past decade, no fewer than four scholars (two writing as co-authors) have made the argument that despite the name "First Vision," the theophany popularly understood as the founding event of Mormonism can—and perhaps should—actually be understood in terms of sound.

---

class: center, middle

# "What is most striking, then, is not simply that the first vision is as much audition as vision—that is, that revelation entails sound as well as image—but rather that **from the very first moment, Mormonism has been produced *through* sound** while simultaneously theorizing *about* its relationship to sound."

Harris, S. J., & McMurray, P. (2018). Sounding Mormonism. *Mormon Studies Review*, *5*, 33-45.

???

In 2018, Harris and McMurray argued that "from the very first moment, Mormonism has been produced through sound" (p. 34).

---

class: center, middle

# "Ironically, the storied First Vision depends less on *seeing* than on the practice of *speaking and hearing*."

Johnson, J. (2019). *Mormons, musical theater, and belonging in America*. University of Illinois Press.

???

Similarly, Johnson's 2019 book distances the First Vision from vision to set the stage for a theory of how voice plays an important role in Mormonism. 

---

class: center, middle

# "Following the Prophet’s martyrdom in 1844, his followers began to call this world-­ historical moment in a woodlot—the origin, as it were, of modernity—­the First Vision.

# "In media terms, a more appropriate descriptor would be the First Audition."

Farmer, J. (2025). *The sound of Mormonism: A media history of Latter-day Saints* (Leonard J. Arrington Mormon History Lecture Series, no. 28). Merill-Cazier Library, Utah State University.

???

Finally, Farmer's 2025 "Media History of Latter-day Saints" begins with a chapter entitled "The First Audition" (p. 3).

---

class: center, middle

# "Precisely because this God continues to direct and command through his Word alone... **He never does anything but speak**."

Ellul, J. (1985). *The Humiliation of the Word*. Wipf & Stock.

???

None of these conceptions is a perfect match with Ellul's writing, but in the aggregate, they do suggest the possibility of understanding this event through the lens of the word. While these arguments are scholarly rather than theological, they do create room for Ellul's (1985) insistence that God "never does anything but speak," (p. 68) and makes few concessions to sight.



---

class: center, middle

# "The 1838 account tha circulated most widely in print **stressed the urgency that Smith's eyes had not deceived him, almost to the point of obsession**s."

Allred, M. K. (2023). *Seeing things: Technologies of vision and the making of Mormonism*. University of North Carolina Press.

???

In contrast, the canonical Latter-day Saint account of the First Vision—in that it has been added to the expanded scriptural canon that is typical of Mormon traditions—is insistent that it was, indeed, a vision. Allred (2023), in his book subtitled "Technologies of Vision and the Making of Mormonism," describes this account as "stress[ing] the urgency that Smith's eyes had not deceived him, almost to the point of obsession" (p. 23). 

---

class: center, middle

# "I had actualy [sic] seen a light... I have actually seen a vision... why does the world think to make me deny what I have actually seen, for I had seen a vision, I knew it, and I knew that God knew it, and I could not deny it...." 

[Joseph Smith History, circa June 1839-circa 1841 [Draft 2]](https://www.josephsmithpapers.org/paper-summary/history-circa-june-1839-circa-1841-draft-2/4)

???
