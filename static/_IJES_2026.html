# Introduction

???


---

class: center, middle

# "Mormonism is a media religion: every contribution to this forum makes this point in some way. Of course, the same could be said of most religions, and yet **the Mormon tradition in particular incorporates media**. How so?" 

Peters, B., & Peters, J. D. (2018). Introduction: Small means, great things. *Mormon Studies Review*, *5*, 17-25. (p. 17)

???

Peters and Peters (2018) concede that most (or all) religions are dependent on media but affirm that "the Mormon tradition in particular incorporates media" (p. 17). The mediated nature of Mormonism invites conversation with Jacques Ellul in two ways. First, to the extent that Mormonism is unusually mediated, Ellul may prove useful for organizing thinking about Mormonism and media. 

---

class: center, middle

# "When I started this project several years ago, I began with the question, **what can Mormonism teach us about the evolving relationship between technology and religion**? It was, and remains, a theoretical question about the cultural history of technology in America using a religious institution as a case study." 

Feller, G. (2023). *Eternity in the ether: A Mormon media history*. University of Illinois Press. (p. vii)

???

Second, Feller (2023) suggests that Mormonism is a helpful example for exploring "the evolving relationship between technology and religion" (p. vii)—and, thus, offering new readings of Ellul.
---

class: center, middle

<a title="Diliff, CC BY-SA 3.0 &lt;http://creativecommons.org/licenses/by-sa/3.0/&gt;, via Wikimedia Commons" href="https://commons.wikimedia.org/wiki/File:Salt_Lake_Temple,_Utah_-_Sept_2004.jpg"><img height = 550, alt="Salt Lake Temple" src="https://upload.wikimedia.org/wikipedia/commons/9/97/Salt_Lake_Temple%2C_Utah_-_Sept_2004.jpg"></a>

<p style = "font-size:smaller"><a href="https://commons.wikimedia.org/wiki/File:Salt_Lake_Temple,_Utah_-_Sept_2004.jpg">The Salt Lake Temple of The Church of Jesus Christ of Latter-day Saints in Salt Lake City, Utah</a> by <a href="https://en.wikipedia.org/wiki/User:Diliff">Diliff</a> is licensed under <a href="https://creativecommons.org/licenses/by-sa/3.0/deed.en">CC BY-SA 3.0</a></p>

???

Before exploring these ideas, I wish to clarify two points. First, Mormonism is a diverse collection of religious traditions, most of which prefer not to be described as "Mormon" (see Shields, 2019), but I use this term today to refer to the best-known of these traditions, the Church of Jesus Christ of Latter-day Saints, headquartered in Utah, USA. 

---

class: center, middle

# "In this book I regularly use the terms 'Mormon' and “Mormonism,” which the Church of Jesus Christ of Latter-day Saints has sought to retire since 2019. The term is more accurate for this project not only because the period covered here is before 2019 but also **because I am not seeking to represent the church but rather a more capacious theological tradition**."

Petrey, T. G. (2024). *Queering kinship in the Mormon cosmos*. The University of North Carolina Press.  (p. xi)

???

I follow Petrey (2024) in using the term "Mormon" when referring to "a more capacious... tradition" (p. xi) than the Latter-day Saint institution that rejects the term.

---

class: center, middle

<a href="https://en.wikipedia.org/wiki/File:IndependenceTemple.jpg#/media/File:IndependenceTemple.jpg"><img src="https://upload.wikimedia.org/wikipedia/en/thumb/7/7e/IndependenceTemple.jpg/1280px-IndependenceTemple.jpg" height = 550 alt="File:IndependenceTemple.jpg"></a>

<p style = "font-size:smaller"><a href="https://en.wikipedia.org/wiki/File:IndependenceTemple.jpg">The Community of Christ Indpendence Temple in Independence, Missouri</a> by <a href="https://en.wikipedia.org/wiki/User:Jonathunder">Jonathunder</a> is licensed under the GNU Free Documentation License</p>
???

Second, while Ellul considered the theological and sociological aspects of his work to be inseparable (see Rognon, 2024), this paper is focused on sociological observation. I do have personal connections to two different Mormon traditions and confess a personal interest in Ellul and Mormon theology. However, I am here as a technology researcher employed by a public US university and will limit my comments to that capacity.

class: center, middle

# Mormonism's Foundational Media

???

The many Mormon traditions all share a common origin: Joseph Smith Jr.'s 1830 organization of a church in New York, USA.


---

class: center, middle

<img src="https://upload.wikimedia.org/wikipedia/commons/c/c8/Joseph_Smith_first_vision_stained_glass.jpg" height = 600>

???

Yet, Latter-day Saint authorities and missionaries typically trace their tradition's beginnings to "The First Vision," a theophany that Smith reported experiencing as a teenager during the 1820s. 

---

class: center, middle

<a title="101heather, Public domain, via Wikimedia Commons" href="https://commons.wikimedia.org/wiki/File:Mormon-book.jpg"><img height="600" alt="The cover of the Book of Mormon" src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Mormon-book.jpg/500px-Mormon-book.jpg"></a>

???

However, this experience was not frequently discussed in the early years of Mormonism (e.g., Allen, 1966; Harper, 2020), and early members of Smith's church were more attracted by the Book of Mormon, a new volume of scripture that he claimed to have translated from records kept by ancient proto-Christians living on the American continent.

---

class: center, middle

<table><tr><td><img src="https://upload.wikimedia.org/wikipedia/commons/c/c8/Joseph_Smith_first_vision_stained_glass.jpg" height = 550><a title="101heather, Public domain, via Wikimedia Commons" href="https://commons.wikimedia.org/wiki/File:Mormon-book.jpg"></td><td><img height="550" alt="The cover of the Book of Mormon" src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Mormon-book.jpg/500px-Mormon-book.jpg"></a></td><tr></table>

???

Both events invite Ellulian analysis. In particular, Ellul's Humiliation of the Word provides a useful framework for explaining how these events are understood in Mormonism and how Mormonism engages with media more broadly. Both the First Vision and the translation of the Book of Mormon can be (and have been) understood as either word or image as Ellul describes them. Of course, these various understandings sometimes blur the distinction that Ellul himself acknowledges is an oversimplification and perhaps more of an imprecise spectrum. 

---

class: center, middle

<img src="https://wipf-stock-us.imgix.net/covers/9781532642562.jpg" height = 600>

???

Importantly, Ellul does not merely distinguish word from image; this comparison is an extension of a deeper distinction between truth and fact (or truth and reality) that serves as a recurring theme in his writing. As I will show, this second distinction is especially useful when studying Mormonism.

---

class: center, middle

background-color: #272822

<h2 style="color:white; text-align:center">The First Vision</h2>

???

In the past decade, no fewer than four scholars (two writing as co-authors) have argued that despite the name "First Vision," this founding Mormon theophany can also be understood in terms of orality.

---

class: center, middle

# "What is most striking, then, is not simply that the first vision is as much audition as vision—that is, that revelation entails sound as well as image—but rather that **from the very first moment, Mormonism has been produced *through* sound** while simultaneously theorizing *about* its relationship to sound."

Harris, S. J., & McMurray, P. (2018). Sounding Mormonism. *Mormon Studies Review*, *5*, 33-45. (p. 34)

???

In 2018, Harris and McMurray argued that "from the very first moment, Mormonism has been produced through sound" (p. 34). 

---

class: center, middle

# "Ironically, the storied First Vision depends less on *seeing* than on the practice of *speaking and hearing*."

Johnson, J. (2019). *Mormons, musical theater, and belonging in America*. University of Illinois Press. 

???

Similarly, Johnson's 2019 book uses the event to develop a theory of the important role voice plays in Mormonism. 

---

class: center, middle

# "Following the Prophet’s martyrdom in 1844, his followers began to call this world-­ historical moment in a woodlot—the origin, as it were, of modernity—­the First Vision.

# "In media terms, a more appropriate descriptor would be the First Audition."

Farmer, J. (2025). *The sound of Mormonism: A media history of Latter-day Saints* (Leonard J. Arrington Mormon History Lecture Series, no. 28). Merill-Cazier Library, Utah State University. (p. 3)

???

Finally, Farmer's 2025 "Media History of Latter-day Saints" begins with a chapter entitled "The First Audition" (p. 3).

---

class: center, middle

# "Precisely because this God continues to direct and command through his Word alone... **He never does anything but speak**."

Ellul, J. (1985). *The Humiliation of the Word*. Wipf & Stock. (p. 68)

???

None of these conceptions perfectly matches Ellul, but together, they suggest the possibility of understanding this event through the lens of the word. While these arguments are scholarly rather than theological, they do create room for Ellul's (1985) insistence that God "never does anything but speak," (p. 68) and makes few concessions to sight.

---

class: center, middle

# "The 1838 account tha circulated most widely in print **stressed the urgency that Smith's eyes had not deceived him, almost to the point of obsession**s."

Allred, M. K. (2023). *Seeing things: Technologies of vision and the making of Mormonism*. University of North Carolina Press. (p. 23)

???

In contrast, the official Latter-day Saint account of the First Vision captures Smith's insistence that it was, indeed, a vision. Allred (2023) describes this account as "stress[ing] the urgency that Smith's eyes had not deceived him, almost to the point of obsession" (p. 23). 

---

class: center, middle

# "I had actualy [sic] seen a light... I have actually seen a vision... why does the world think to make me deny what I have actually seen, for I had seen a vision, I knew it, and I knew that God knew it, and I could not deny it...." 

[Joseph Smith History, circa June 1839-circa 1841 [Draft 2]](https://www.josephsmithpapers.org/paper-summary/history-circa-june-1839-circa-1841-draft-2/4)

???

Indeed, Smith writes: "I had actualy [sic] seen a light... I have actually seen a vision... why does the world think to make me deny what I have actually seen, for I had seen a vision, I knew it, and I knew that God knew it, and I could not deny it...."

---

class: center, middle

# "My general thesis is that nowhere do we have true theophany, genuinely comparable to the theophanies found in all religions...."

Ellul, J. (1985). *The Humiliation of the Word*. Wipf & Stock. (p. 72)

???

While Ellul (1985) is seemingly skeptical of "true theophany" (p. 72), Smith insisted that he had experienced such a phenomenon. 

---

class: center, middle

<a title="Orson Pratt, Public domain, via Wikimedia Commons" href="https://commons.wikimedia.org/wiki/File:Orson_Pratt_engraving.png"><img height="600" alt="Orson Pratt engraving" src="https://upload.wikimedia.org/wikipedia/commons/c/c6/Orson_Pratt_engraving.png"></a>

???

However, even Smith's supporters have not always insisted on literal vision. Orson Pratt, a contemporary of Smith elevated by him to a high church position, played a crucial role in making the First Vision central to Mormon thinking (Harper, 2020). Indeed, Pratt appears to be one of the first to use an account of the vision for evangelism purposes.

---

class: center, middle

# "When it first came upon him, it produced a peculiar sensation throughout his whole system; and, immediately his mind was **caught away, from the natural objects with which he was surrounded; and he was enwrapped in a heavenly vision**, and saw two glorious personages, who exactly resembled each other in their features or likeness."

In Morris, L. E. (2019). *A documentary history of The Book of Mormon*. Oxford University Press. (p. 98)

???

In an 1840 pamphlet published in Great Britain, he described Smith's mind as "caught away, from the natural objects with which he was surrounded; and he was enwrapped in a heavenly vision" (see Morris, 2019 p. 98). This account more closely resembles Ellul's (1985) conception of visions as "deal[ing] with realities utterly different from the ones which make up the world perceived by our senses" (p. 75). 

---

class: center, middle

# "[Visions] refer to images and are *seen*, but they **deal with realities utterly different from the ones which make up the world perceived by our senses**."

Ellul, J. (1985). *The Humiliation of the Word*. Wipf & Stock. (p. 75)

???

This account more closely resembles Ellul's (1985) conception of visions as "deal[ing] with realities utterly different from the ones which make up the world perceived by our senses" (p. 77). 

---

class: center, middle

<img src="https://upload.wikimedia.org/wikipedia/commons/c/c8/Joseph_Smith_first_vision_stained_glass.jpg" height = 600>

???

There is another aspect of the First Vision that further associates it with the word. The official account described by Allred as almost obsessed with the visual is not Smith's only account of his theophany. It was written in 1838, over a decade after the experience reportedly took place. However, between 1832 and 1842, Smith wrote at least four accounts of this experience, and there are differences between these accounts, including whether God alone appeared to Smith or God and Jesus appeared as two separate persons. 

---

class: center, middle

# "The written word is continually repeated and always identical; this is not possible for the true word. **Ask the person speaking with you to repeat the explanation he has just given, and it will be different**."

Ellul, J. (1985). *The Humiliation of the Word*. Wipf & Stock. (p. 44)

???

These differences, while potentially awkward for orthodox Latter-day Saints, are consistent with Ellul's (1985) observations about the word: He argues that if you ask "the person speaking with you to repeat the explanation he has just given... it will be different" (p. 44). 

---

class: center, middle

# "The written word is **continually repeated and always identical**; this is not possible for the true word. Ask the person speaking with you to repeat the explanation he has just given, and it will be different."

Ellul, J. (1985). *The Humiliation of the Word*. Wipf & Stock. (p. 44)


???

And yet, the existence of an official account demonstrates Latter-day Saint authorities' interest in fixing this word in writing so that it takes on aspects of the image, becoming "continually repeated and always identical" (p. 44). Indeed, for about three decades, the early 1832 account of this event was excised from the letterbook it was recorded in (see Larson, 2014), presumably to downplay the existence of a conflicting version.


---

class: center, middle

background-color: #272822

<h2 style="color:white; text-align:center">The Translation of the Book of Mormon</h2>

???

Joseph Smith claimed to have translated the Book of Mormon from records engraved on metal plates by religious and political figures living in the Americas centuries before. 

---

class: center, middle

<img height = 500 src="https://media.giphy.com/media/l2SqaNIf3uvMe00us/giphy.gif">

???

Because Smith himself offered little insight (see, e.g., Hardy, 2021; Morris, 2019), the mechanics of this translation have been a subject of considerable conjecture. A 2003 episode of the American animated television show South Park caused controversy in Mormon circles by depicting Smith as looking into "seer stones" in a hat to translate.

---

class: center, middle

<img height="500" src="https://spencergreenhalgh.com/JSPOTR.jpg">

<p style = "font-size:smaller">still from 2005 official Latter-day Saint film <em>Joseph Smith: Prophet of the Restoration</em></p>

???

This contrasted with contemporary Latter-day Saint depictions, which showed Smith reading from the plates. Although both depictions emphasize the visual, the South Park depiction was uncomfortable for the way it depicted American 19th century folk magic practices. It was therefore surprising when, in 2013, an official Latter-day Saint essay implicitly accepted the South Park portrayal—or, more accurately, accepted the historical accounts that portrayal had been based on.

---

class: center, middle

# "In a larger picture, however, the essay is significant not because it is progressive but because it is markedly conservative even by LDS standards."

Duffy, J.-C. (2020). The "Book of Mormon Translation" essay in historical context. In M. L. Harris & N. G. Bringhurst (Eds.), *The LDS Gospel Topics Series: A Scholarly Engagement* (pp. 97-130). Signature Books. (p. 99)

???

However, Duffy (2020) has argued that the promotion of inconvenient historical accounts should not be seen as progressive; rather, "the essay is... markedly conservative even by LDS standards" (p. 99). 

---

class: center, middle

# "it was not inevitable that the Gospel Topics essay would assert the particular scenario it did for *how* the Book of Mormon was translated—namely, that Smith ***read* the English translation from the interpretive instruments**."

Duffy, J.-C. (2020). The "Book of Mormon Translation" essay in historical context. In M. L. Harris & N. G. Bringhurst (Eds.), *The LDS Gospel Topics Series: A Scholarly Engagement* (pp. 97-130). Signature Books. (p. 99)


???

This is where Ellul's framework enters. As Duffy goes on to explain, the essay didn't just accept the seer stone scenario but also argued that "Smith read the English translation from the interpretive instruments." (p. 99, emphasis in original; see also Hardy, 2021). This understanding affirms that Smith saw written words visually appear. If the folk magic connotations of this understanding remain awkward, it remains desirable for the way it appeals to the image as Ellul understands it. How can one contest the text of the Book of Mormon if it was read word-by-word from a divinely prepared seer stone?


---

class: center, middle

# "Eyewitnesses to the translation described two different stone instruments that Joseph used to translate the Book of Mormon. They testified that as Joseph looked into these objects, the text of the Book of Mormon was revealed to him."

"[Book of Mormon Translation](https://www.churchofjesuschrist.org/study/manual/gospel-topics/book-of-mormon-translation?lang=eng)," The Church of Jesus Christ of Latter-day Saints

???

However, this is not the only way of understanding the Book of Mormon translation. Even a 2025 Latter-day Saint essay appears to back off from strong claims; while it also emphasizes the visual, it does not claim that the text appeared in the seer stone (Church of Jesus Christ of Latter-day Saints, n.d.). This is more of a backing away from the image than a full embrace of the word, but Duffy (2008, 2020) has described how even some Mormon apologists have conceded that Smith must have played a *word*-like role in developing the text, subjectively interpreting spiritual impressions.

---

class: center, middle

# "In 1829 Joseph Smith Jr., the future prophet and founder of the Latter Day Saint movement, produced the Book of Mormon in **an extended oral performance**."

Davis, W. L. (2020). *Visions in a seer stone: Joseph Smith and the making of the Book of Mormon*. University of North Carolina Press. (p. 7)

???

Scholars not bound by apologetic commitments have gone even further. Davis (2020) draws on 19th century U.S. cultures of orality to argue that Smith's translation was "an extended oral performance" (p. 7), 

---

class: center, middle

# "By the time he actually started dictating the text, Smith would have required only a **small handful of notes** containing brief outlines and narrative cues, which he could keep private among his personal papers."

Davis, W. L. (2020). *Visions in a seer stone: Joseph Smith and the making of the Book of Mormon*. University of North Carolina Press. (p. 190)

???

the foundations of which were prepared over four years and perhaps committed to "a small handful of notes" (p. 190) consulted in between dictations but extemporaneously expanded in the moment.

Davis's invocation of secret notes is necessarily speculation but opens the door to considering how Smith engaged with written texts during the translation process. 

---

class: center, middle

# "The same process applies to **religious writing**. It **is filled with life only when it serves as a support and starting point for a word that is spoken, announced, or proclaimed**."

Ellul, J. (1985). *The Humiliation of the Word*. Wipf & Stock. (p. 46)

???

Ellul sees the written word as somewhere between the true word and the image. In the context of "religious writing," he specifically argues that it "is filled with life only when it serves as a support and starting point for a word that is spoken, announced, or proclaimed." (Ellul, 1985, p. 46). While Smith's goal was to produce written word, Davis's understanding of the translation process as oral performance lets us understand Smith's oral reproduction of written texts in these Ellulian terms. 

---

class: center, middle

<img height = 500 src="https://website-files-bucket.s3.us-west-2.amazonaws.com/products/book-of-mormon-critical-text-project-volume-3-part-5-the-king-james-quotations-in-the-book-of-mormon-the-history-of-the-text-of-the-book-of-mormon.jpg">

cover of Skousen, R. (2019). *The history of the text of the Book of Mormon, part five: The King James quotations in the Book of Mormon*. The Foundation for Ancient Research and Mormon Studies.

???

Somewhat infamously, the Book of Mormon quotes the King James Version of the Bible at considerable length (Skousen, 2019). While some apologists have insisted that these near-verbatim quotations were displayed in the seer stone—or otherwise revealed—others have conceded that Smith likely dictated from (and made occasional verbal edits to) text he was reading from an open Bible (Duffy, 2020; see also Skousen's 2019 discussion of evidence for dictation). Townsend (2025) goes even further, arguing that Smith used a Bible commentary as a source for edits.

---

class: center, middle

background-color: #272822

<h2 style="color:white; text-align:center">Image, Reality, and Technique in Mormon Thought</h2>

???

Thus far, I have demonstrated that the two foundational media events of Mormonism can be understood as closer to either the *word* or the *image*. You may have noticed that it is most often scholars who privilege *word*-based explanations while church authorities and conservative apologists tend to insist on *image*-oriented accounts. Like the underlying *image*/*word* framework, this is a bit of an oversimplification, but the pattern is consistent enough to be useful. What I would like to do next is to tie this conservative preference for the *image* to a preference for *reality* over *truth*, following Ellul's distinction of the two.



---

class: center, middle

<a title="Jan van Boeckel, ReRun Productions, CC BY-SA 4.0 &lt;https://creativecommons.org/licenses/by-sa/4.0&gt;, via Wikimedia Commons" href="https://commons.wikimedia.org/wiki/File:Jacques_Ellul_(cropped).jpg"><img height="450" alt="Jacques Ellul" src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/79/Jacques_Ellul_%28cropped%29.jpg/960px-Jacques_Ellul_%28cropped%29.jpg"></a>

<p style="font:smaller"><a href="https://commons.wikimedia.org/wiki/File:Jacques_Ellul_(cropped).jpg">French sociologist and technology critique Jacques Ellul in his house in Pessac, France</a> by <a href="https://commons.wikimedia.org/wiki/User:Janboek">Jan van Boeckel</a> is licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/deed.en">CC BY-SA 4.0 International</a></p>

???

It is also helpful to consider how Ellulian technique may be relevant when exploring these connections between image and reality. Ellul (1985) explicitly links both concepts to technique and also insists that technique must be evaluated as a whole—that it is less desirable to consider examples individually. While I have discussed Smith's First Vision and his translation of the Book of Mormon as distinct events, it is also useful to consider how the two are intertwined. 

---

class: center, middle

???

In fact, Allred (2023) has already done so, arguing that "Latter-day Saints used print to store and reproduce the powerful electric shock of Smith's vision" (p. 25). While Allred does not use Ellulian terms, his observation helps us consider how early Mormon media events served as a technicized whole.
